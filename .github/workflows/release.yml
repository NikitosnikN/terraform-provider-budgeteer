# This GitHub action can publish assets for release when a tag is created.
name: release
on:
  push:
    branches:
      - 'main'
permissions:
  contents: write
  id-token: write
jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
      - name: Auto Tag
        id: tag
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git fetch --tags
          
          # Get the latest tag, default to v0.0.0 if no tags exist
          latest_tag=$(git describe --tags `git rev-list --tags --max-count=1` 2>/dev/null || echo "v0.0.0")
          echo "Latest tag: $latest_tag"
          
          # Check if there are changes since the last tag
          if [ "$latest_tag" != "v0.0.0" ]; then
            changes=$(git rev-list ${latest_tag}..HEAD --count)
            echo "Changes since $latest_tag: $changes commits"
            if [ "$changes" -eq "0" ]; then
              echo "No changes since last tag, skipping release..."
              exit 0
            fi
          fi
          
          # Extract version numbers (remove 'v' prefix)
          version=${latest_tag#v}
          IFS='.' read -ra VERSION_PARTS <<< "$version"
          
          # Default to 0.0.0 if parsing fails
          major=${VERSION_PARTS[0]:-0}
          minor=${VERSION_PARTS[1]:-0}
          patch=${VERSION_PARTS[2]:-0}
          
          echo "Current version: $major.$minor.$patch"
          
          # Increment patch version
          new_patch=$((patch + 1))
          new_version="v$major.$minor.$new_patch"
          
          echo "New version: $new_version"
          
          # Check if tag already exists
          if git rev-parse "$new_version" >/dev/null 2>&1; then
            echo "Tag $new_version already exists, skipping..."
          else
            echo "Creating new tag: $new_version"
            
            # Generate changelog
            echo "## Changelog" > changelog.md
            if [ "$latest_tag" != "v0.0.0" ]; then
              git log ${latest_tag}..HEAD --oneline --pretty=format:"- %s" >> changelog.md
            else
              git log --oneline --pretty=format:"- %s" >> changelog.md
            fi
            
            echo "Changelog:"
            cat changelog.md
            
            git tag -a "$new_version" -m "Release $new_version"
            git push origin "$new_version"
            echo "new_version=$new_version" >> $GITHUB_OUTPUT
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.21'
      - name: Update Go modules
        run: |
          go mod tidy
          go mod verify
      - name: Import GPG key
        uses: crazy-max/ghaction-import-gpg@v5
        id: import_gpg
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.PASSPHRASE }}

      
      - name: Run GoReleaser
        if: steps.tag.outputs.new_version != ''
        uses: goreleaser/goreleaser-action@v4
        with:
          version: latest
          args: release --clean
        env:
          GPG_FINGERPRINT: ${{ steps.import_gpg.outputs.fingerprint }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
